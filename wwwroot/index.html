<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubeManager | Enterprise Orchestrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.15.2/ace.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { k8s: '#326CE5', darkbase: '#111827', card: '#1F2937' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f3f4f6; }
        .sidebar { background-color: #1e293b; border-right: 1px solid #334155; }
        .nav-item { transition: all 0.2s; border-left: 4px solid transparent; cursor: pointer; }
        .nav-item:hover { background-color: #326CE510; color: #60a5fa; }
        .nav-item.active { background-color: #326CE520; color: #60a5fa; border-left-color: #326ce5; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); border-color: rgba(50, 108, 229, 0.4); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1); }
        select option { background-color: #1e293b; color: #f3f4f6; }
        select:focus { border-color: #3b82f6; outline: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-sm font-sans selection:bg-blue-500/30">

    <!-- SIDEBAR -->
    <aside class="sidebar w-72 flex-shrink-0 flex flex-col z-20 shadow-2xl">
        <div class="h-20 flex items-center px-8 border-b border-slate-700/50">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center mr-3 shadow-lg shadow-blue-900/40">
                <i class="fas fa-dharmachakra text-xl text-white animate-[spin_10s_linear_infinite]"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-white">Kube<span class="text-blue-500">Manager</span></span>
        </div>
        
        <div class="p-6 uppercase text-[10px] font-bold text-slate-500 tracking-[0.2em]">Gestão do Cluster</div>
        
        <nav class="flex-1 overflow-y-auto w-full px-3">
            <a onclick="loadView('dashboard', this)" class="nav-item active flex items-center px-6 py-3.5 mb-1 rounded-xl text-slate-300">
                <i class="fas fa-th-large w-6 opacity-50"></i> <span class="font-medium">Visão Geral</span>
            </a>
            <a onclick="loadView('nodes', this)" class="nav-item flex items-center px-6 py-3.5 mb-1 rounded-xl text-slate-300">
                <i class="fas fa-server w-6 opacity-50"></i> <span class="font-medium">Nodes</span>
            </a>
            <a onclick="loadView('namespaces', this)" class="nav-item flex items-center px-6 py-3.5 mb-1 rounded-xl text-slate-300">
                <i class="fas fa-folder-open w-6 opacity-50"></i> <span class="font-medium">Namespaces</span>
            </a>
            <a onclick="loadView('pods', this)" class="nav-item flex items-center px-6 py-3.5 mb-1 rounded-xl text-slate-300">
                <i class="fas fa-cubes w-6 opacity-50"></i> <span class="font-medium">Pods</span>
            </a>
            <a onclick="loadView('deployments', this)" class="nav-item flex items-center px-6 py-3.5 mb-1 rounded-xl text-slate-300">
                <i class="fas fa-layer-group w-6 opacity-50"></i> <span class="font-medium">Deployments</span>
            </a>
            <a onclick="loadView('services', this)" class="nav-item flex items-center px-6 py-3.5 mb-1 rounded-xl text-slate-300">
                <i class="fas fa-network-wired w-6 opacity-50"></i> <span class="font-medium">Services</span>
            </a>
            <a onclick="loadView('ingresses', this)" class="nav-item flex items-center px-6 py-3.5 mb-1 rounded-xl text-slate-300">
                <i class="fas fa-route w-6 opacity-50"></i> <span class="font-medium">Ingress</span>
            </a>
            <a onclick="loadView('k8ssecrets', this)" class="nav-item flex items-center px-6 py-3.5 mb-1 rounded-xl text-slate-300">
                <i class="fas fa-key w-6 opacity-50"></i> <span class="font-medium">Secrets</span>
            </a>
            <a onclick="loadView('events', this)" class="nav-item flex items-center px-6 py-3.5 mb-1 rounded-xl text-slate-300">
                <i class="fas fa-bell w-6 opacity-50"></i> <span class="font-medium">Eventos</span>
            </a>

            <div class="p-6 uppercase text-[10px] font-bold text-slate-500 tracking-[0.2em] border-t border-slate-700/50 mt-4">Infraestrutura</div>
            
            <div class="flex items-center group">
                <a onclick="loadView('vms', this)" class="nav-item flex-1 flex items-center px-6 py-3.5 mb-1 rounded-xl text-slate-300">
                    <i class="fas fa-desktop w-6 opacity-50"></i> <span class="font-medium">Gerir VMs Proxmox</span>
                </a>
                <button id="vmLogoutBtn" onclick="logoutProxmox()" class="hidden px-4 py-3.5 text-slate-500 hover:text-red-400 transition" title="Terminar Sessão Proxmox">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            
            <a onclick="loadView('clusters', this)" class="nav-item flex items-center px-6 py-3.5 mb-1 rounded-xl text-slate-300">
                <i class="fas fa-project-diagram w-6 opacity-50"></i> <span class="font-medium">Gerir Clusters</span>
            </a>
        </nav>
        
        <div class="p-6 border-t border-slate-700 text-[10px] text-slate-500 font-bold uppercase tracking-widest text-center">
            TL2 LTI 25/26
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden relative bg-slate-900">
        <header class="h-20 flex items-center justify-between px-10 bg-slate-800/40 border-b border-slate-700/50 backdrop-blur-xl z-10">
            <div class="flex items-center">
                <h1 id="pageTitle" class="text-2xl font-bold text-white tracking-tight mr-4">Visão Geral</h1>
                <div id="loadingIndicator" class="hidden"><i class="fas fa-circle-notch fa-spin text-blue-500/50"></i></div>
            </div>
            <div class="flex items-center space-x-4">
                <div id="nsSelectorContainer" class="flex items-center bg-slate-700/30 rounded-xl px-4 py-2 border border-slate-600/30 hidden hover:bg-slate-700/50 transition">
                    <i class="fas fa-filter text-slate-500 mr-3 text-xs"></i>
                    <select id="globalNamespaceSelector" onchange="changeNamespace(this.value)" class="bg-transparent text-white text-xs font-bold focus:outline-none cursor-pointer">
                    </select>
                </div>
                <div class="flex items-center bg-slate-950/50 rounded-full px-4 py-2 border border-slate-700/50 shadow-inner">
                    <span id="headerClusterBadge" class="w-2 h-2 rounded-full bg-slate-500 mr-3"></span>
                    <span id="headerClusterText" class="text-slate-300 text-[10px] font-bold uppercase tracking-widest">Nenhum Cluster</span>
                </div>
                <button onclick="refreshCurrentView()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-white rounded-xl transition bg-slate-700/30 hover:bg-slate-600/50 border border-slate-600/30 group">
                    <i class="fas fa-sync-alt text-sm group-active:rotate-180 transition-transform duration-500"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-10" id="mainContent">
        </div>
        
        <div id="toastArea" class="fixed bottom-6 right-6 z-[100] flex flex-col space-y-3"></div>
    </main>

    <!-- MODAL -->
    <div id="modalOverlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-card w-full max-w-lg rounded-3xl border border-slate-700 shadow-2xl overflow-hidden transform scale-95 transition-all duration-300" id="modalContent">
            <div class="p-8 border-b border-slate-700/50 flex justify-between items-center bg-slate-800/30">
                <h3 id="modalTitle" class="text-xl font-bold text-white">Criar Recurso</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white transition w-8 h-8 rounded-full hover:bg-slate-700 flex items-center justify-center"><i class="fas fa-times text-lg"></i></button>
            </div>
            <div class="p-8" id="modalBody">
                <!-- Form will be injected here -->
            </div>
            <div class="p-8 bg-slate-800/30 border-t border-slate-700/50 flex justify-end space-x-4">
                <button onclick="closeModal()" class="px-6 py-3 rounded-xl text-slate-400 font-bold hover:text-white transition">CANCELAR</button>
                <button id="modalConfirmBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-blue-900/20 transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">CRIAR</button>
            </div>
        </div>
    </div>

    <script>
        const apiBase = '/api';
        let currentView = 'dashboard';
        let selectedNamespace = 'all';
        let cpuChart = null; let memChart = null;
        let refreshInterval = null;
        let activeCluster = sessionStorage.getItem('active_cluster') || '';
        let viewCache = {}; 
        
        let session = { 
            ticket: sessionStorage.getItem('pve_ticket'), 
            csrf: sessionStorage.getItem('pve_csrf'), 
            user: sessionStorage.getItem('pve_user'),
            url: sessionStorage.getItem('pve_url')
        };

        function updateProxmoxButtonState() {
            const btn = document.getElementById('vmLogoutBtn');
            if(session.ticket) btn.classList.remove('hidden');
            else btn.classList.add('hidden');
        }

        async function attemptLogin() {
            const btn = event?.target;
            if(btn) btn.disabled = true;
            let u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            const ip = document.getElementById('loginIp').value;
            
            if(!u || !p || !ip) { if(btn) btn.disabled = false; return showToast("Preencha todos os campos", "error"); }
            
            let url = ip;
            if(!url.startsWith('http')) url = 'https://' + url;
            if(!url.includes(':', 8)) url = url + ':8006';

            let r = 'pam';
            if(u.includes('@')) {
                const parts = u.split('@');
                u = parts[0];
                r = parts[1];
            }

            try {
                const res = await fetch(`${apiBase}/auth/login`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ username: u, password: p, url: url, realm: r }) 
                });
                const d = await res.json();
                if(res.ok && d.success) {
                    session = { ticket: d.ticket, csrf: d.csrfPreventionToken, user: d.username, url: url };   
                    sessionStorage.setItem('pve_ticket', session.ticket); sessionStorage.setItem('pve_csrf', session.csrf); sessionStorage.setItem('pve_user', session.user); sessionStorage.setItem('pve_url', session.url);  
                    showToast(`Autenticado em ${url}`, "success"); updateProxmoxButtonState(); loadVmData();   
                } else showToast(d.message || "Erro de credenciais", "error");
            } catch { showToast("Não foi possível contactar o Proxmox", "error"); }
            finally { if(btn) btn.disabled = false; }
        }

        function logoutProxmox() {
            sessionStorage.removeItem('pve_ticket'); sessionStorage.removeItem('pve_csrf'); sessionStorage.removeItem('pve_user'); sessionStorage.removeItem('pve_url');
            session = { ticket: null, csrf: null, user: null, url: null }; updateProxmoxButtonState();
            if(currentView === 'vms') { delete viewCache['vms']; loadVmData(); }
            showToast("Sessão Proxmox terminada", "info");
        }

        async function secureFetch(url, options = {}) {
            if(!options.headers) options.headers = {};
            if(session.ticket) { options.headers['X-PVE-Ticket'] = session.ticket; options.headers['X-PVE-CSRF'] = session.csrf; options.headers['X-PVE-Url'] = session.url; }
            if(activeCluster) options.headers['X-K8s-Cluster'] = activeCluster;
            document.getElementById('loadingIndicator').classList.remove('hidden');
            try {
                const res = await fetch(url, options);
                if(res.status === 401 && url.includes('/vms')) { session.ticket = null; updateProxmoxButtonState(); loadVmData(); }
                return res;
            } catch (err) {
                console.error("Fetch error:", err);
                showToast("Erro de ligação (Timeout ou Rede)", "error");
                throw err;
            } finally { document.getElementById('loadingIndicator').classList.add('hidden'); }
        }

        function showToast(m, t) { 
            const a = document.getElementById('toastArea'); 
            const d = document.createElement('div'); 
            d.className = `${t==='error'?'bg-red-600 shadow-red-900/40':'bg-blue-600 shadow-blue-900/40'} text-white px-8 py-4 rounded-2xl shadow-2xl fade-in flex items-center space-x-3 border border-white/20 min-w-[300px] backdrop-blur-md`; 
            d.innerHTML = `<i class="fas ${t==='error'?'fa-exclamation-triangle':'fa-info-circle'} text-lg"></i><span class="font-bold text-xs uppercase tracking-wider">${m}</span>`; 
            a.appendChild(d); 
            setTimeout(() => { d.style.opacity = '0'; d.style.transform = 'translateX(20px)'; setTimeout(() => d.remove(), 500); }, 5000); 
        }

        function loadView(v, el, skipCache = false) {
            currentView = v;
            if(el) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
            const titles = { 'dashboard': 'Visão Geral', 'nodes': 'Nodes', 'namespaces': 'Namespaces', 'pods': 'Pods', 'deployments': 'Deployments', 'services': 'Services', 'ingresses': 'Ingress', 'vms': 'Gerir VMs Proxmox', 'events': 'Eventos', 'clusters': 'Gerir Clusters' };
            document.getElementById('pageTitle').innerText = titles[v] || 'Visão Geral';
            const reqNs = ['pods','deployments','services','ingresses','events'];
            if(reqNs.includes(v)) { document.getElementById('nsSelectorContainer').classList.remove('hidden'); loadNamespaceOptions(); }
            else document.getElementById('nsSelectorContainer').classList.add('hidden');
            if(v !== 'dashboard') { clearInterval(refreshInterval); refreshInterval = null; }
            if(!skipCache && viewCache[v]) {
                document.getElementById('mainContent').innerHTML = viewCache[v];
                if(v === 'dashboard' && viewCache['dashboard_data']) renderDashboardCharts(viewCache['dashboard_data']);
            } else { document.getElementById('mainContent').innerHTML = '<div class="flex justify-center py-20"><i class="fas fa-circle-notch fa-spin text-5xl text-blue-600 opacity-20"></i></div>'; }
            if(v === 'vms') loadVmData();
            else if(v === 'clusters') loadClustersList();
            else if(!activeCluster) {
                const h = `<div class="flex flex-col items-center justify-center py-24 text-slate-500 slide-up"><div class="w-24 h-24 bg-slate-800 rounded-3xl flex items-center justify-center mb-8 shadow-xl border border-slate-700/50"><i class="fas fa-dharmachakra text-4xl opacity-10"></i></div><p class="text-2xl font-bold text-white mb-2 tracking-tight">Nenhum Cluster Ativo</p><p class="max-w-xs text-center leading-relaxed text-slate-400">Para gerir recursos Kubernetes, configure e ative um cluster no menu <a onclick="loadView('clusters', null)" class="text-blue-500 cursor-pointer hover:underline font-bold">Gerir Clusters</a>.</p></div>`;
                document.getElementById('mainContent').innerHTML = h; viewCache[v] = h;
            }
            else if(v === 'dashboard') { loadDashboardData(); if(!refreshInterval) refreshInterval = setInterval(loadDashboardData, 10000); }
            else if(v === 'events') loadEventsData();
            else loadListData(v);
        }

        async function loadVmData() {
            if(!session.ticket) {
                const h = `<div class="flex justify-center py-10 slide-up"><div class="bg-card glass p-10 rounded-[2.5rem] border border-slate-700/50 shadow-2xl w-full max-w-md"><div class="text-center mb-8"><div class="w-16 h-16 bg-blue-600/10 text-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-4"><i class="fas fa-desktop text-2xl"></i></div><h3 class="text-2xl font-bold text-white tracking-tight">Proxmox Login</h3><p class="text-slate-400 mt-1 text-xs">Ligue-se ao nó Proxmox para gerir a infraestrutura</p></div><div class="space-y-4"><div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">IP do Servidor</label><input type="text" id="loginIp" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 focus:outline-none transition shadow-inner" placeholder="ex: 192.168.24.196"></div><div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Utilizador</label><input type="text" id="loginUser" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 focus:outline-none transition shadow-inner" placeholder="root"></div><div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Senha</label><input type="password" id="loginPass" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 focus:outline-none transition shadow-inner" placeholder="••••••••"></div><button onclick="attemptLogin()" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 py-4 rounded-xl font-bold mt-4 hover:shadow-lg hover:shadow-blue-900/40 transition-all active:scale-95 text-white tracking-widest text-xs">LIGAR AO PROXMOX</button><div class="text-center pt-2"><a href="javascript:void(0)" onclick="const ip=document.getElementById('loginIp').value; if(ip) window.open((ip.startsWith('http')?'':'https://')+ip+(ip.includes(':')?'':':8006'),'_blank')" class="text-[10px] text-blue-400 hover:text-blue-300 font-bold uppercase tracking-tighter transition"><i class="fas fa-shield-alt mr-1"></i> Validar Certificado / Sessão</a></div></div></div></div>`;
                if (currentView === 'vms') document.getElementById('mainContent').innerHTML = h; return;
            }
            try {
                const res = await secureFetch(`${apiBase}/vms`);
                if(!res.ok) throw new Error("Erro de resposta");
                const vms = await res.json();
                if (currentView !== 'vms') return;
                let h = `<div class="bg-card rounded-2xl overflow-hidden border border-slate-700 shadow-2xl slide-up"><table class="w-full text-left"><thead class="bg-slate-800/80 text-[10px] uppercase font-bold text-slate-400 tracking-wider"><tr class="border-b border-slate-700/50"><th class="px-8 py-5">VMID</th><th class="px-8 py-5">Nome</th><th class="px-8 py-5 text-center">Estado</th><th class="px-8 py-5 text-right">Controlo</th></tr></thead><tbody class="divide-y divide-slate-700/30">`;
                vms.forEach(vm => {
                    const isRunning = vm.status === 'running';
                    const isPaused = vm.status === 'paused';
                    const s = isRunning ? 'bg-green-500/20 text-green-400 border-green-500/20' : 
                              isPaused ? 'bg-orange-500/20 text-orange-400 border-orange-500/20' :
                              'bg-red-500/20 text-red-400 border-red-500/20';
                    
                    h += `<tr class="hover:bg-slate-800/30 transition group"><td class="px-8 py-5 font-mono text-blue-400 font-bold">${vm.vmId}</td><td class="px-8 py-5 font-bold text-white">${vm.name} <span class="block text-[10px] text-slate-500 font-normal uppercase tracking-tighter mt-0.5">Node: ${vm.node}</span></td><td class="px-8 py-5 text-center"><span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase border ${s}">${vm.status}</span></td><td class="px-8 py-5 text-right space-x-1.5">`;
                    
                    if (isRunning) {
                        h += `<button onclick="openVmConsole('${vm.node}', ${vm.vmId}, '${vm.name}')" class="w-9 h-9 rounded-lg bg-slate-500/10 text-slate-400 hover:bg-slate-500 hover:text-white transition shadow-sm" title="Abrir Shell Remote"><i class="fas fa-terminal text-xs"></i></button><button onclick="vmAction('${vm.node}', ${vm.vmId}, 'reboot')" class="w-9 h-9 rounded-lg bg-blue-500/10 text-blue-400 hover:bg-blue-500 hover:text-white transition shadow-sm" title="Reboot"><i class="fas fa-redo text-xs"></i></button><button onclick="vmAction('${vm.node}', ${vm.vmId}, 'shutdown')" class="w-9 h-9 rounded-lg bg-amber-500/10 text-amber-400 hover:bg-amber-500 hover:text-white transition shadow-sm" title="Shutdown"><i class="fas fa-power-off text-xs"></i></button><button onclick="vmAction('${vm.node}', ${vm.vmId}, 'stop')" class="w-9 h-9 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white transition shadow-sm" title="Stop (Hard Kill)"><i class="fas fa-skull text-xs"></i></button><button onclick="vmAction('${vm.node}', ${vm.vmId}, 'suspend')" class="w-9 h-9 rounded-lg bg-purple-500/10 text-purple-400 hover:bg-purple-500 hover:text-white transition shadow-sm" title="Suspend / Hibernate"><i class="fas fa-moon text-xs"></i></button>`;
                    } else if (isPaused) {
                        h += `<button onclick="vmAction('${vm.node}', ${vm.vmId}, 'resume')" class="w-9 h-9 rounded-lg bg-orange-500/10 text-orange-400 hover:bg-orange-500 hover:text-white transition shadow-sm" title="Resume"><i class="fas fa-play-circle text-xs"></i></button><button onclick="vmAction('${vm.node}', ${vm.vmId}, 'stop')" class="w-9 h-9 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white transition shadow-sm" title="Stop (Hard Kill)"><i class="fas fa-skull text-xs"></i></button>`;
                    } else {
                        h += `<button onclick="vmAction('${vm.node}', ${vm.vmId}, 'start')" class="w-9 h-9 rounded-lg bg-green-500/10 text-green-400 hover:bg-green-500 hover:text-white transition shadow-sm" title="Start"><i class="fas fa-play text-xs"></i></button>`;
                    }
                    h += `<button onclick="openCloneVmModal('${vm.node}', ${vm.vmId}, '${vm.name}')" class="w-9 h-9 rounded-lg bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500 hover:text-white transition shadow-sm" title="Clonar VM"><i class="fas fa-copy text-xs"></i></button><button onclick="deleteVm('${vm.node}', ${vm.vmId})" class="w-9 h-9 rounded-lg bg-rose-500/10 text-rose-400 hover:bg-rose-500 hover:text-white transition shadow-sm" title="Eliminar VM"><i class="fas fa-trash-alt text-xs"></i></button></td></tr>`;
                });
                const finalH = h + `</tbody></table></div>`; document.getElementById('mainContent').innerHTML = finalH; viewCache['vms'] = finalH;
            } catch { 
                if (currentView !== 'vms') return;

cat << 'EOF' > "\$SCRIPT_PYTHON"
import subprocess
from http.server import BaseHTTPRequestHandler, HTTPServer
PORT = 8080
class ConfigHandler(BaseHTTPRequestHandler):
    def do_GET(self):
        try:
            output = subprocess.check_output(["microk8s", "config"], text=True)

            self.send_header("Content-Type", "text/plain; charset=utf-8")
            self.send_header("Access-Control-Allow-Origin", "*")
            self.end_headers()

        async function updateServiceSelectorOptions(ns) {
            const select = document.getElementById('svc_label'); if(!select) return;

            try {
                const podsRes = await secureFetch(`${apiBase}/pods?ns=${ns}`);

                const pods = await podsRes.json();
                const deps = await depsRes.json();

                select.onchange = () => {
                    if(select.value === 'manual') {

                console.error(err);

            }
        }

        function handleSecretFileImport(inputId, targetId) {
            const file = document.getElementById(inputId).files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById(targetId).value = e.target.result;
                showToast(`Ficheiro '${file.name}' carregado`, "success");
            };
            reader.readAsText(file);
        }

        async function generateSelfSigned(commonNameId, certId, keyId) {
            const cn = document.getElementById(commonNameId).value || "site.local";
            try {
                const res = await secureFetch(`${apiBase}/k8ssecrets/generate-self-signed`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ commonName: cn })
                });
                const d = await res.json();
                if(res.ok) {
                    document.getElementById(certId).value = d.cert;
                    document.getElementById(keyId).value = d.key;
                    showToast("Certificado auto-assinado gerado!", "success");
                } else showToast(d.message || "Erro ao gerar", "error");
            } catch { showToast("Erro de rede ao gerar", "error"); }
        }

        async function updateIngressSecretOptions(ns) {
            const select = document.getElementById('ing_tls_secret'); if(!select) return;
            select.innerHTML = '<option value="">A carregar secrets...</option>';
            try {
                const res = await secureFetch(`${apiBase}/k8ssecrets?ns=${ns}`); 
                const data = await res.json().catch(() => null);
                
                if(!res.ok) {
                    throw new Error(data?.message || `Erro HTTP ${res.status}`);
                }

                let html = '<option value="">-- Selecionar Secret --</option>';
                if(Array.isArray(data) && data.length > 0) {
                    // Tenta encontrar segredos de TLS, mas aceita Opaque como fallback se o utilizador souber o que está a fazer
                    let tlsSecrets = data.filter(s => s.type === 'kubernetes.io/tls' || s.type?.includes('tls'));
                    
                    if(tlsSecrets.length === 0) {
                        // Se não houver TLS específicos, mostra todos para permitir seleção manual (útil se o tipo não estiver correto no K8s)
                        tlsSecrets = data; 
                    }

                    if(tlsSecrets.length > 0) {
                        tlsSecrets.forEach(s => { 
                            const typeLabel = s.type === 'kubernetes.io/tls' ? 'TLS' : 'OPAQUE';
                            html += `<option value="${s.name}">${s.name} (${typeLabel})</option>`; 
                        });
                    } else {
                        html = '<option value="">Nenhum secret encontrado</option>';
                    }
                } else {
                    html = '<option value="">Nenhum secret encontrado</option>';
                }
                select.innerHTML = html;
            } catch (err) { 
                console.error("Erro ao carregar secrets:", err);
                select.innerHTML = `<option value="">Erro: ${err.message}</option>`; 
            }
        }

            } else if(type === 'services') {

e-500 focus:outline-none transition shadow-inner text-xs" value="80"></div><div class="col-span-4"><label class="block text-[8px] font-bold text-slate-600 uppercase mb-1 ml-1">Target (Pod)</label><input type="number" class="svc-tport w-full bg-slate-900/50 border border-slate-700 rounded-xl px-3 py-2 text-white focus:border-blue-500 focus:outline-none transition shadow-inner text-xs" value="80"></div><div class="col-span-3"><label class="block text-[8px] font-bold text-slate-600 uppercase mb-1 ml-1">Proto</label><select class="svc-proto w-full bg-slate-900/50 border border-slate-700 rounded-xl px-2 py-2 text-white focus:border-blue-500 focus:outline-none transition shadow-inner text-[10px] font-bold"><option>TCP</option><option>UDP</option></select></div><div class="col-span-1"></div></div></div></div>${advancedToggleHtml}<div><div class="flex justify-between items-center mb-2 ml-1"><label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest">Labels Personalizadas (Seletor)</label><button onclick="addKvRow('svcLabelsContainer')" class="text-blue-500 hover:text-blue-400 text-[10px] font-bold uppercase tracking-widest"><i class="fas fa-plus-circle mr-1"></i> Adicionar</button></div><div id="svcLabelsContainer" class="max-h-32 overflow-y-auto pr-2"></div></div></div></div></div>`;
            } else if(type === 'ingresses') {
                form = `${nsSelectorHtml}<div class="space-y-6"><div class="grid grid-cols-2 gap-6"><div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Nome do Ingress</label><input type="text" id="ing_name" oninput="validateCreateForm()" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition shadow-inner"></div><div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Host (DNS)</label><input type="text" id="ing_host" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition shadow-inner" placeholder="myapp.local"></div></div><div class="grid grid-cols-2 gap-6"><div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Serviço Alvo</label><select id="ing_svc" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition shadow-inner uppercase text-[10px] font-bold"><option value="">A carregar serviços...</option></select></div><div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Porta do Serviço</label><input type="number" id="ing_port" value="80" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition shadow-inner"></div></div><div class="grid grid-cols-2 gap-6"><div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Caminho (Path)</label><input type="text" id="ing_path" value="/" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition shadow-inner"></div><div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Tipo de Caminho</label><select id="ing_path_type" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition shadow-inner uppercase text-[10px] font-bold"><option value="Prefix">Prefix</option><option value="Exact">Exact</option><option value="ImplementationSpecific">ImplementationSpecific</option></select></div></div>${advancedToggleHtml}<div><div class="flex items-center space-x-3 mb-4"><input type="checkbox" id="ing_tls_enable" onchange="document.getElementById('tlsSecretContainer').classList.toggle('hidden', !this.checked); if(this.checked) updateIngressSecretOptions(document.getElementById('create_resource_ns').value)" class="w-4 h-4 rounded border-slate-700 bg-slate-900 text-blue-600 focus:ring-blue-500"><label for="ing_tls_enable" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest cursor-pointer">Ativar TLS (HTTPS)</label></div><div id="tlsSecretContainer" class="hidden"><label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Secret TLS</label><div class="flex space-x-3"><select id="ing_tls_secret" class="flex-1 bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition shadow-inner uppercase text-[10px] font-bold"><option value="">A carregar secrets...</option></select><div class="flex space-x-2"><button onclick="closeModal(); setTimeout(() => openCreateModal('secrets', 'ingresses'), 300)" class="w-12 bg-slate-800 border border-slate-700 rounded-xl text-blue-500 hover:bg-slate-700 transition" title="Novo Secret TLS"><i class="fas fa-plus"></i></button><button onclick="closeModal(); loadView('k8ssecrets', null)" class="w-12 bg-slate-800 border border-slate-700 rounded-xl text-amber-500 hover:bg-slate-700 transition" title="Gerir Secrets Existentes"><i class="fas fa-tasks"></i></button></div></div></div></div><div><div class="flex justify-between items-center mb-2 ml-1"><label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest">Anotações (Annotations)</label><button onclick="addKvRow('annotationsContainer')" class="text-blue-500 hover:text-blue-400 text-[10px] font-bold uppercase tracking-widest"><i class="fas fa-plus-circle mr-1"></i> Adicionar</button></div><div id="annotationsContainer" class="max-h-32 overflow-y-auto pr-2"></div></div></div></div></div>`;
            }
            
            document.getElementById('modalBody').innerHTML = form; 
            document.getElementById('modalConfirmBtn').innerText = 'CRIAR';

            if(type === 'namespaces') {
                document.getElementById('modalConfirmBtn').onclick = () => submitCreate('namespaces', { name: document.getElementById('ns_name').value }, returnTo);
            } else if(type === 'secrets') {
                document.getElementById('modalConfirmBtn').onclick = () => submitCreate('k8ssecrets', { namespace: document.getElementById('create_resource_ns').value, name: document.getElementById('sec_name').value, cert: document.getElementById('sec_cert').value, key: document.getElementById('sec_key').value }, returnTo);
            } else if(type === 'pods') {
                document.getElementById('pod_name').oninput = (e) => { validateCreateForm(); if(!document.querySelector('#labelsContainer input')) { const container = document.getElementById('labelsContainer'); container.innerHTML = ''; addKvRow('labelsContainer'); const row = container.querySelector('div'); row.querySelector('.kv-key').value = 'app'; row.querySelector('.kv-val').value = e.target.value; } };
                document.getElementById('modalConfirmBtn').onclick = () => { 
                    const labels = {}; document.querySelectorAll('#labelsContainer > div').forEach(row => { const k = row.querySelector('.kv-key').value.trim(); const v = row.querySelector('.kv-val').value.trim(); if(k) labels[k] = v; });
                    const envVars = {}; document.querySelectorAll('#envContainer > div').forEach(row => { const k = row.querySelector('.kv-key').value.trim(); const v = row.querySelector('.kv-val').value.trim(); if(k) envVars[k] = v; });
                    submitCreate('pods', { namespace: document.getElementById('create_resource_ns').value, name: document.getElementById('pod_name').value, image: document.getElementById('pod_image').value, containerPort: document.getElementById('pod_port').value ? parseInt(document.getElementById('pod_port').value) : null, labels: labels, envVars: envVars, cpuLimit: document.getElementById('pod_cpu').value, memLimit: document.getElementById('pod_mem').value }); 
                };
            } else if(type === 'deployments') {
                document.getElementById('modalConfirmBtn').onclick = () => { 
                    const envVars = {}; document.querySelectorAll('#envContainer > div').forEach(row => { const k = row.querySelector('.kv-key').value.trim(); const v = row.querySelector('.kv-val').value.trim(); if(k) envVars[k] = v; }); 
                    submitCreate('deployments', { namespace: document.getElementById('create_resource_ns').value, name: document.getElementById('dep_name').value, image: document.getElementById('dep_image').value, replicas: parseInt(document.getElementById('dep_replicas').value), containerPort: document.getElementById('dep_port').value ? parseInt(document.getElementById('dep_port').value) : null, cpuLimit: document.getElementById('dep_cpu').value, memLimit: document.getElementById('dep_mem').value, envVars: envVars, imagePullPolicy: document.getElementById('dep_pull_policy').value, updateStrategy: document.getElementById('dep_strategy').value }); 
                };
            } else if(type === 'services') {
                document.getElementById('modalConfirmBtn').onclick = () => { 
                    const ports = []; document.querySelectorAll('#portsContainer > div').forEach(row => { const p = row.querySelector('.svc-port').value; const tp = row.querySelector('.svc-tport').value; const proto = row.querySelector('.svc-proto').value; if(p && tp) ports.push({ port: parseInt(p), targetPort: parseInt(tp), protocol: proto }); }); 
                    const customLabels = {}; document.querySelectorAll('#svcLabelsContainer > div').forEach(row => { const k = row.querySelector('.kv-key').value.trim(); const v = row.querySelector('.kv-val').value.trim(); if(k) customLabels[k] = v; });
                    submitCreate('services', { namespace: document.getElementById('create_resource_ns').value, name: document.getElementById('svc_name').value, appLabel: document.getElementById('svc_label').value, ports: ports, type: document.getElementById('svc_type').value, customLabels: customLabels }); 
                };
                updateServiceSelectorOptions(currentNsForCreate);
            } else if(type === 'ingresses') {
                document.getElementById('modalConfirmBtn').onclick = () => {
                    const annotations = {}; document.querySelectorAll('#annotationsContainer > div').forEach(row => { const k = row.querySelector('.kv-key').value.trim(); const v = row.querySelector('.kv-val').value.trim(); if(k) annotations[k] = v; });
                    submitCreate('ingresses', { namespace: document.getElementById('create_resource_ns').value, name: document.getElementById('ing_name').value, host: document.getElementById('ing_host').value, serviceName: document.getElementById('ing_svc').value, port: parseInt(document.getElementById('ing_port').value), path: document.getElementById('ing_path').value, pathType: document.getElementById('ing_path_type').value, tlsSecret: document.getElementById('ing_tls_enable').checked ? document.getElementById('ing_tls_secret').value : null, annotations: annotations });
                };
                updateIngressServiceOptions(currentNsForCreate);
            }

            validateCreateForm();
        }

        async function submitCreate(type, data, returnTo = null) {
            const btn = document.getElementById('modalConfirmBtn'); btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> CRIANDO';
            try {
                const res = await secureFetch(`${apiBase}/${type}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if(res.ok) { showToast("Recurso criado", "success"); closeModal(); if(type === 'namespaces') await loadNamespaceOptions(); if(returnTo) setTimeout(() => openCreateModal(returnTo), 500); else loadCurrentView(true); }
                else { const err = await res.json().catch(() => ({})); showToast(err.message || "Erro ao criar", "error"); }
            } finally { btn.disabled = false; btn.innerText = 'CRIAR'; validateCreateForm(); }
        }

        async function viewPodLogs(name, ns) { try { const res = await secureFetch(`${apiBase}/pods/${name}/logs?ns=${ns}`); const d = await res.json(); openLogModal(name, d.logs); } catch { showToast("Erro ao ler logs", "error"); } }
        function openLogModal(name, logs) { const overlay = document.getElementById('modalOverlay'); overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.add('opacity-100'), 10); document.getElementById('modalTitle').innerText = `Logs: ${name}`; document.getElementById('modalBody').innerHTML = `<pre class="bg-slate-950 p-6 rounded-2xl text-green-500 font-mono text-[10px] overflow-auto max-h-[60vh] border border-slate-800 shadow-inner">${logs}</pre>`; document.getElementById('modalConfirmBtn').classList.add('hidden'); }

        async function editYaml(type, name, ns) {
            const overlay = document.getElementById('modalOverlay'); overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.add('opacity-100'), 10);
            document.getElementById('modalTitle').innerText = `Editar YAML: ${name}`;
            document.getElementById('modalBody').innerHTML = `<div id="yamlEditor" class="h-80 w-full rounded-xl border border-slate-700 overflow-hidden"></div>`;
            const editor = ace.edit("yamlEditor"); editor.setTheme("ace/theme/monokai"); editor.session.setMode("ace/mode/yaml");
            try {
                let url = `${apiBase}/yaml/${type}/${name}`; if(ns) url += `?ns=${ns}`;
                const res = await secureFetch(url); const d = await res.json(); editor.setValue(d.yaml, -1);
            } catch { showToast("Erro ao carregar YAML", "error"); }
            const btn = document.getElementById('modalConfirmBtn'); btn.innerText = 'GUARDAR'; btn.classList.remove('hidden');
            btn.onclick = async () => {
                btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> GUARDANDO';
                try {
                    let url = `${apiBase}/yaml/${type}/${name}`; if(ns) url += `?ns=${ns}`;
                    const res = await secureFetch(url, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ yaml: editor.getValue() }) });
                    if(res.ok) { showToast("YAML atualizado", "success"); closeModal(); loadCurrentView(true); }
                    else { const err = await res.json().catch(() => ({})); showToast(err.message || "Erro ao validar", "error"); }
                } finally { btn.disabled = false; btn.innerText = 'GUARDAR'; }
            };
        }

        function openScaleModal(name, ns, current) {
            const overlay = document.getElementById('modalOverlay'); overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.add('opacity-100'), 10); document.getElementById('modalTitle').innerText = `Escalar: ${name}`; document.getElementById('modalBody').innerHTML = `<div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Número de Replicas</label><input type="number" id="scale_val" value="${current}" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition shadow-inner"></div>`;
            const btn = document.getElementById('modalConfirmBtn'); btn.classList.remove('hidden'); btn.innerText = 'ESCALAR';
            btn.onclick = async () => { btn.disabled = true; try { const res = await secureFetch(`${apiBase}/deployments/scale`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ namespace: ns, name: name, replicas: parseInt(document.getElementById('scale_val').value) }) }); if(res.ok) { showToast("Deployment escalado", "success"); closeModal(); loadCurrentView(true); } } finally { btn.disabled = false; } };
        }

        async function deleteResource(type, name, ns) {
            if(!confirm(`Eliminar ${name}?`)) return;
            let url = `${apiBase}/${type}/${name}`; if(ns) url += `?ns=${ns}`;
            const res = await secureFetch(url, { method: 'DELETE' });
            if(res.ok) { showToast("Eliminado", "success"); loadCurrentView(true); } else showToast("Erro ao eliminar", "error");
        }

        function openRoleModal(nodeName, currentRoles) {
            const overlay = document.getElementById('modalOverlay'); overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.add('opacity-100'), 10);
            document.getElementById('modalTitle').innerText = `Definir Role: ${nodeName}`;
            document.getElementById('modalBody').innerHTML = `<div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Role do Node</label><select id="node_role_val" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition shadow-inner uppercase text-[10px] font-bold"><option value="">Nenhuma</option><option value="control-plane" ${currentRoles.includes('control-plane') ? 'selected' : ''}>Control Plane</option><option value="worker" ${currentRoles.includes('worker') || currentRoles === '' ? 'selected' : ''}>Worker</option></select><p class="mt-4 text-[10px] text-slate-500 italic uppercase tracking-tighter">Isto irá atualizar a label 'node-role.kubernetes.io/&lt;role&gt;'</p></div>`;
            const btn = document.getElementById('modalConfirmBtn'); btn.classList.remove('hidden'); btn.innerText = 'ATUALIZAR';
            btn.onclick = async () => {
                btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> ATUALIZANDO';
                try {
                    const res = await secureFetch(`${apiBase}/nodes/${nodeName}/role`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ role: document.getElementById('node_role_val').value }) });
                    if(res.ok) { showToast("Role do node atualizada", "success"); closeModal(); loadCurrentView(true); }
                    else { const err = await res.json().catch(() => ({})); showToast(err.message || "Erro ao atualizar role", "error"); }
                } catch { showToast("Erro ao comunicar com a API", "error"); }
                finally { btn.disabled = false; btn.innerText = 'ATUALIZAR'; }
            };
        }

        function closeModal() { const overlay = document.getElementById('modalOverlay'); overlay.classList.remove('opacity-100'); document.getElementById('modalContent').classList.remove('scale-100'); setTimeout(() => { overlay.classList.add('hidden'); document.getElementById('modalConfirmBtn').classList.remove('hidden'); }, 300); }
        async function loadEventsData() { 
            try { 
                const res = await secureFetch(`${apiBase}/events?ns=${selectedNamespace}`); 
                const d = await res.json(); 
                if(!d.length) {
                    const emptyH = `<div class="bg-card glass p-20 rounded-[2.5rem] border border-slate-700/50 text-center flex flex-col items-center slide-up"><div class="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center mb-4"><i class="fas fa-bell-slash text-2xl text-slate-600"></i></div><p class="italic text-slate-500 tracking-widest uppercase text-[10px] font-bold">Nenhum evento recente em ${selectedNamespace}</p></div>`;
                    document.getElementById('mainContent').innerHTML = emptyH; viewCache['events'] = emptyH; return;
                }
                let h = `<div class="space-y-4 slide-up">`; 
                d.forEach(e => { 
                    const time = e.lastSeen ? new Date(e.lastSeen).toLocaleTimeString() : '---';
                    h += `<div class="bg-card glass p-6 rounded-[1.5rem] border-l-4 ${e.type==='Warning'?'border-amber-500 bg-amber-500/5':'border-blue-500 bg-blue-500/5'} border-slate-700/50 flex justify-between items-center shadow-lg transition-all hover:scale-[1.01]"><div><p class="text-white font-black text-xs uppercase tracking-tight">${e.reason} <span class="text-slate-500 font-bold ml-2 opacity-50">/ ${e.source || 'Desconhecido'}</span></p><p class="text-slate-400 mt-2 text-sm leading-relaxed">${e.message}</p></div><span class="text-[10px] font-bold text-slate-600 bg-slate-950/50 px-3 py-1 rounded-full border border-slate-800">${time}</span></div>`; 
                }); 
                document.getElementById('mainContent').innerHTML = h + `</div>`; viewCache['events'] = h + `</div>`; 
            } catch { showToast("Falha ao ler eventos", "error"); } 
        }
        async function loadNamespaceOptions() { let options = `<option value="all" ${selectedNamespace === 'all' ? 'selected' : ''}>TODOS OS NAMESPACES</option>`; try { const res = await secureFetch(`${apiBase}/namespaces`); if(res.ok) { const ns = await res.json(); options += ns.map(n => `<option value="${n.name}" ${n.name === selectedNamespace ? 'selected' : ''}>${n.name.toUpperCase()}</option>`).join(''); } } catch {} document.getElementById('globalNamespaceSelector').innerHTML = options; }
        function updateHeaderClusterStatus() { const b = document.getElementById('headerClusterBadge'); const t = document.getElementById('headerClusterText'); if(activeCluster) { b.className = "w-2 h-2 rounded-full bg-blue-500 mr-3 animate-pulse"; t.innerText = activeCluster; } else { b.className = "w-2 h-2 rounded-full bg-slate-500 mr-3"; t.innerText = "Nenhum Cluster"; } }
        function loadCurrentView(skipCache = false) { loadView(currentView, null, skipCache); }
        function refreshCurrentView() { loadView(currentView, null, true); }
        function changeNamespace(n) { selectedNamespace = n; loadCurrentView(true); }
        function showToast(m, t) { const a = document.getElementById('toastArea'); const d = document.createElement('div'); d.className = `${t==='error'?'bg-red-600 shadow-red-900/40':'bg-blue-600 shadow-blue-900/40'} text-white px-8 py-4 rounded-2xl shadow-2xl fade-in flex items-center space-x-3 border border-white/20 min-w-[300px] backdrop-blur-md`; d.innerHTML = `<i class="fas ${t==='error'?'fa-exclamation-triangle':'fa-info-circle'} text-lg"></i><span class="font-bold text-xs uppercase tracking-wider">${m}</span>`; a.appendChild(d); setTimeout(() => { d.style.opacity = '0'; d.style.transform = 'translateX(20px)'; setTimeout(() => d.remove(), 500); }, 5000); }
        window.onload = () => { updateHeaderClusterStatus(); updateProxmoxButtonState(); loadView('dashboard', null); };
    </script>
</body>
